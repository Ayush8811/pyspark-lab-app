name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone the HF Space repo
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/ayush260201/pyspark-lab hf_space

          # Copy backend files into the HF Space
          cp -r backend/* hf_space/

          # Push changes
          cd hf_space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --cached --quiet || (git commit -m "Auto-sync from GitHub $(date)" && git push)
